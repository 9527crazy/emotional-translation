<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Emotion Detection Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'SF Mono', 'Menlo', monospace; background: #1a1a2e; color: #eee; padding: 20px; }
    h1 { color: #e94560; margin-bottom: 20px; }
    .controls { margin-bottom: 20px; display: flex; gap: 8px; flex-wrap: wrap; }
    button { background: #0f3460; color: #eee; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    button:hover { background: #16213e; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 20px; }
    .card { background: #16213e; border-radius: 12px; padding: 16px; }
    .card img { width: 100%; border-radius: 8px; margin-bottom: 12px; max-height: 280px; object-fit: cover; }
    .card h3 { color: #e94560; margin-bottom: 8px; font-size: 14px; }
    .card .result { font-size: 12px; line-height: 1.8; }
    .card .result .dominant { font-size: 18px; font-weight: bold; color: #00d2ff; }
    .card .match { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    .card .match.ok { background: #0a3; }
    .card .match.fail { background: #c00; }
    .blendshapes { background: #0a0a1a; padding: 12px; border-radius: 8px; margin-top: 8px; max-height: 200px; overflow-y: auto; font-size: 11px; }
    .blendshapes .row { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px solid #1a1a2e; }
    .blendshapes .row .val { color: #00d2ff; }
    .status { padding: 12px; background: #16213e; border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
    .status.success { border-left: 4px solid #0f0; }
    .status.error { border-left: 4px solid #f00; }
    .status.loading { border-left: 4px solid #ff0; }
    #log { background: #0a0a1a; padding: 12px; border-radius: 8px; margin-top: 20px; max-height: 400px; overflow-y: auto; font-size: 12px; white-space: pre-wrap; line-height: 1.5; }
    .score-bar { display: inline-block; height: 10px; background: #00d2ff; border-radius: 2px; margin-left: 4px; vertical-align: middle; }
    .camera-box { margin-top: 16px; }
    .camera-box video { width: 320px; border-radius: 8px; border: 2px solid #0f3460; }
  </style>
</head>
<body>
  <h1>🎭 Emotion Detection Test</h1>

  <div class="controls">
    <button id="btnInit" onclick="initModel()">1. Init MediaPipe</button>
    <button id="btnTest" onclick="runAllTests()" disabled>2. Run Image Tests</button>
    <button id="btnCamera" onclick="testCamera()" disabled>3. Test Camera (30s)</button>
  </div>

  <div id="status" class="status">Click "1. Init MediaPipe" to start</div>
  <div id="gallery" class="gallery"></div>
  <div class="camera-box" id="cameraBox"></div>
  <div id="log"></div>

  <script type="module">
    import { FaceLandmarker, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/+esm';

    const WASM_URL = 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm';
    const MODEL_URL = 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task';

    // Test images — using clearly expressive faces from public domain / Wikimedia
    const TEST_IMAGES = [
      {
        name: 'Happy 😊',
        url: 'https://images.unsplash.com/photo-1527980965255-d3b416303d12?w=400&fit=crop&crop=face',
        expected: 'happy',
      },
      {
        name: 'Sad 😢',
        url: 'https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=400&fit=crop&crop=face',
        expected: 'sad',
      },
      {
        name: 'Surprised 😲',
        url: 'https://images.unsplash.com/photo-1545167622-3a6ac756afa4?w=400&fit=crop&crop=face',
        expected: 'surprised',
      },
      {
        name: 'Angry 😠',
        url: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&fit=crop&crop=face',
        expected: 'angry',
      },
    ];

    const WEIGHTS = {
      'mouthSmileLeft':    { happy: 0.9 },
      'mouthSmileRight':   { happy: 0.9 },
      'mouthFrownLeft':    { sad: 0.6 },
      'mouthFrownRight':   { sad: 0.6 },
      'mouthOpen':         { surprised: 0.4, fearful: 0.2 },
      'mouthPucker':       { disgusted: 0.4 },
      'mouthDimpleLeft':   { happy: 0.3 },
      'mouthDimpleRight':  { happy: 0.3 },
      'mouthPressLeft':    { angry: 0.3 },
      'mouthPressRight':   { angry: 0.3 },
      'mouthShrugLower':   { disgusted: 0.4 },
      'mouthFunnel':       { surprised: 0.3 },
      'mouthStretchLeft':  { fearful: 0.2, surprised: 0.1 },
      'mouthStretchRight': { fearful: 0.2, surprised: 0.1 },
      'browInnerUp':       { surprised: 0.5, fearful: 0.3 },
      'browDownLeft':      { angry: 0.5, fearful: 0.2 },
      'browDownRight':     { angry: 0.5, fearful: 0.2 },
      'browOuterUpLeft':   { surprised: 0.2, sad: 0.15 },
      'browOuterUpRight':  { surprised: 0.2, sad: 0.15 },
      'eyeWideLeft':       { surprised: 0.4, fearful: 0.3 },
      'eyeWideRight':      { surprised: 0.4, fearful: 0.3 },
      'eyeSquintLeft':     { happy: 0.3, angry: 0.15 },
      'eyeSquintRight':    { happy: 0.3, angry: 0.15 },
      'noseSneerLeft':     { disgusted: 0.5, angry: 0.15 },
      'noseSneerRight':    { disgusted: 0.5, angry: 0.15 },
      'jawForward':        { angry: 0.3 },
      'jawOpen':           { surprised: 0.3, fearful: 0.2 },
      'cheekSquintLeft':   { happy: 0.2 },
      'cheekSquintRight':  { happy: 0.2 },
    };

    let faceLandmarker = null;
    const logEl = document.getElementById('log');
    const statusEl = document.getElementById('status');

    function log(msg) {
      logEl.textContent += msg + '\n';
      logEl.scrollTop = logEl.scrollHeight;
      console.log(msg);
    }

    window.initModel = async function() {
      document.getElementById('btnInit').disabled = true;
      statusEl.className = 'status loading';
      statusEl.textContent = '⏳ Loading MediaPipe model...';
      log('Loading MediaPipe FaceLandmarker...');

      try {
        const filesetResolver = await FilesetResolver.forVisionTasks(WASM_URL);
        faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
          baseOptions: { modelAssetPath: MODEL_URL, delegate: 'GPU' },
          outputFaceBlendshapes: true,
          runningMode: 'IMAGE',
          numFaces: 1,
        });
        statusEl.className = 'status success';
        statusEl.textContent = '✅ Model loaded! Click "2. Run Image Tests"';
        document.getElementById('btnTest').disabled = false;
        document.getElementById('btnCamera').disabled = false;
        log('✅ MediaPipe initialized successfully');
      } catch (err) {
        statusEl.className = 'status error';
        statusEl.textContent = '❌ Init failed: ' + err.message;
        log('❌ Init failed: ' + err);
      }
    };

    function classifyEmotion(blendshapes) {
      const scores = { happy: 0, sad: 0, angry: 0, surprised: 0, fearful: 0, disgusted: 0, neutral: 0 };
      const bsMap = new Map(blendshapes.map(b => [b.categoryName, b.score]));

      for (const [name, weights] of Object.entries(WEIGHTS)) {
        const val = bsMap.get(name) ?? 0;
        if (val < 0.02) continue;
        for (const [emo, w] of Object.entries(weights)) {
          scores[emo] += val * w;
        }
      }

      let dominant = 'neutral';
      let maxScore = 0;
      for (const [emo, s] of Object.entries(scores)) {
        if (emo !== 'neutral' && s > maxScore) { maxScore = s; dominant = emo; }
      }

      if (maxScore < 0.08) {
        scores.neutral = 1;
        dominant = 'neutral';
        maxScore = 1;
      }

      return { scores, dominant, confidence: maxScore };
    }

    function loadImage(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error('Image load failed'));
        img.src = url;
      });
    }

    window.runAllTests = async function() {
      if (!faceLandmarker) return alert('Init first!');
      document.getElementById('btnTest').disabled = true;
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';
      log('\n' + '='.repeat(50));
      log('Running Image Tests...');
      log('='.repeat(50));

      for (const test of TEST_IMAGES) {
        log(`\n--- ${test.name} ---`);
        statusEl.textContent = `Testing: ${test.name}...`;

        let img;
        try {
          img = await loadImage(test.url);
          log(`  Image loaded: ${img.width}x${img.height}`);
        } catch {
          log(`  ❌ Image load failed, trying fallback...`);
          if (test.fallback) {
            try { img = await loadImage(test.fallback); } catch { log('  ❌ Fallback also failed'); renderCard(gallery, test, null, null); continue; }
          } else {
            renderCard(gallery, test, null, null);
            continue;
          }
        }

        try {
          const results = faceLandmarker.detect(img);

          if (!results.faceLandmarks || results.faceLandmarks.length === 0) {
            log('  ❌ No face detected in image');
            renderCard(gallery, test, null, null);
            continue;
          }

          const blendshapes = results.faceBlendshapes?.[0]?.categories ?? [];
          log(`  Blendshapes: ${blendshapes.length} categories`);

          // Log top 10 blendshapes
          const top = [...blendshapes].sort((a, b) => b.score - a.score).slice(0, 10);
          log('  Top blendshapes:');
          for (const bs of top) {
            if (bs.score > 0.005) {
              log(`    ${bs.categoryName}: ${bs.score.toFixed(4)}`);
            }
          }

          const emotion = classifyEmotion(blendshapes);
          const match = emotion.dominant === test.expected;

          log(`  → Detected: ${emotion.dominant} (${(emotion.confidence * 100).toFixed(1)}%)`);
          log(`  → Expected: ${test.expected}`);
          log(`  → Match: ${match ? '✅ YES' : '❌ NO'}`);

          renderCard(gallery, test, emotion, blendshapes);
        } catch (err) {
          log(`  ❌ Detection error: ${err.message}`);
          renderCard(gallery, test, null, null);
        }
      }

      statusEl.className = 'status success';
      statusEl.textContent = '✅ Tests complete!';
      document.getElementById('btnTest').disabled = false;
    };

    function renderCard(container, test, emotion, blendshapes) {
      const card = document.createElement('div');
      card.className = 'card';
      const match = emotion && emotion.dominant === test.expected;
      const matchLabel = emotion ? (match ? '<span class="match ok">✅ MATCH</span>' : '<span class="match fail">❌ MISMATCH</span>') : '<span class="match fail">⚠️ NO FACE</span>';

      card.innerHTML = `
        <img src="${test.url}" alt="${test.name}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22150%22><rect fill=%22%2316213e%22 width=%22200%22 height=%22150%22/><text fill=%22%23666%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22>Image failed</text></svg>'">
        <h3>${test.name}</h3>
        <div class="result">
          <div>Expected: <strong>${test.expected}</strong> ${matchLabel}</div>
          ${emotion ? `
            <div style="margin-top:8px">Detected: <span class="dominant">${emotion.dominant}</span> (${(emotion.confidence * 100).toFixed(1)}%)</div>
            <div style="margin-top:8px">
              ${Object.entries(emotion.scores).sort(([,a],[,b]) => b-a).filter(([,s]) => s > 0.001).map(([e, s]) => `
                <div>${e}: <strong>${(s*100).toFixed(1)}%</strong> <span class="score-bar" style="width:${Math.min(s*300, 200)}px"></span></div>
              `).join('')}
            </div>
          ` : '<div style="color:#f66;margin-top:8px">No face detected</div>'}
        </div>
        ${blendshapes ? `
          <details style="margin-top:8px"><summary style="cursor:pointer;color:#888;font-size:11px">Top blendshapes (${blendshapes.length})</summary>
            <div class="blendshapes">
              ${[...blendshapes].sort((a,b) => b.score - a.score).slice(0, 15).map(b => `
                <div class="row"><span>${b.categoryName}</span><span class="val">${b.score.toFixed(4)}</span></div>
              `).join('')}
            </div>
          </details>
        ` : ''}
      `;
      container.appendChild(card);
    }

    window.testCamera = async function() {
      if (!faceLandmarker) return alert('Init first!');
      log('\n' + '='.repeat(50));
      log('Camera Test — 30 seconds');
      log('='.repeat(50));

      const video = document.createElement('video');
      video.autoplay = true;
      video.playsInline = true;
      video.muted = true;
      video.style.width = '320px';
      video.style.borderRadius = '8px';
      video.style.border = '2px solid #0f3460';
      document.getElementById('cameraBox').appendChild(video);

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
        video.srcObject = stream;
        await new Promise(r => video.onloadeddata = r);
        log('📷 Camera started. Move your face around!');

        let count = 0;
        const interval = setInterval(() => {
          const results = faceLandmarker.detectForVideo(video, performance.now());
          count++;

          if (results.faceLandmarks?.length > 0) {
            const blendshapes = results.faceBlendshapes?.[0]?.categories ?? [];
            const emotion = classifyEmotion(blendshapes);

            // Log every 5th frame
            if (count % 5 === 0) {
              const top3 = [...blendshapes].sort((a,b) => b.score - a.score).slice(0, 5);
              log(`[${count}] ${emotion.dominant.toUpperCase()} ${(emotion.confidence*100).toFixed(0)}% | ${top3.map(b => `${b.categoryName}=${b.score.toFixed(2)}`).join(' ')}`);
            }
          } else {
            if (count % 20 === 0) log(`[${count}] No face detected`);
          }
        }, 100);

        setTimeout(() => {
          clearInterval(interval);
          stream.getTracks().forEach(t => t.stop());
          video.remove();
          log('\n📷 Camera test ended');
        }, 30000);

      } catch (err) {
        log('❌ Camera error: ' + err.message);
      }
    };
  </script>
</body>
</html>
